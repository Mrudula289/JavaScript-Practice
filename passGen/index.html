<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
    }

    .container-box {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .title {
      font-weight: 600;
      font-size: 28px;
    }

    .progress {
      height: 12px;
    }

    .copy-btn {
      width: 80px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="container-box">

    <h3 class="title mb-4">🔐 Password Generator</h3>

    <!-- Password Length -->
    <div class="mb-3">
      <label class="form-label">Password Length:</label>
      <input type="number" class="form-control" value="17">
    </div>

    <!-- Checkboxes -->
    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked>
      <label class="form-check-label">Include Numbers</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked>
      <label class="form-check-label">Include Uppercase</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" checked>
      <label class="form-check-label">Include Special Characters</label>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" checked>
      <label class="form-check-label">
        Exclude ambiguous characters (e.g. l, 1, I, O, 0)
      </label>
    </div>

    <!-- Button -->
    <button class="btn btn-primary mb-3">Generate Password</button>

    <!-- Generated Password -->
    <div class="mb-3">
      <label class="form-label">Generated Password:</label>
      <input type="text" class="form-control" value="7zP+sBz(CJzEESFVZ">
    </div>

    <!-- Show Password -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" checked>
      <label class="form-check-label">Show Password</label>
    </div>

    <!-- Strength Bar -->
    <div class="progress mb-2">
      <div class="progress-bar bg-success" style="width: 100%"></div>
    </div>
    <small class="text fw-bold">Very Strong</small>

    <!-- Copy Button -->
    <div class="mt-3">
      <button class="btn btn-outline-secondary copy-btn">Copy</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
