<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Performance Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .high-performance {
      background-color: #d4edda;
    }
    .low-performance {    
      background-color: #f8d7da;
    }
  </style>
</head>
<body>
  <h1>Employee Performance Tracker</h1>
  <table id="performanceTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Performance Score</th>    
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>John Doe</td>
        <td>Sales</td>
        <td>85</td>
      </tr>
      <tr>
        <td>Jane Smith</td>       
        <td>Marketing</td>
        <td>92</td>
      </tr>
      <tr>
        <td>Emily Johnson</td>
        <td>Development</td>
        <td>78</td>

      </tr>
      <tr>
        <td>Michael Brown</td>
        <td>Support</td>                
        <td>65</td>
      </tr>
    </tbody>
  </table>  
  <script>
    const table = document.getElementById('performanceTable');
    const rows = table.getElementsByTagName('tbody')[0].getElementsByTagName('tr');

    for (let i = 0; i < rows.length; i++) {
      const scoreCell = rows[i].getElementsByTagName('td')[2];
      const score = parseInt(scoreCell.textContent);

      if (score >= 90) {
        rows[i].classList.add('high-performance');
      } else if (score < 70) {
        rows[i].classList.add('low-performance');
      }
    }
  </script>
</body>
</html>
